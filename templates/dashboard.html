<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard &middot; TaskDesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">
      <span class="brand-mark">TD</span>
      <span class="brand-name">TaskDesk</span>
    </div>
    <div class="topbar-user">
      <span class="user-pill"><span class="user-dot"></span>{{ username }}</span>
      <a href="{{ url_for('logout') }}" class="btn btn-ghost">Log out</a>
    </div>
  </header>

  <main class="shell">
    <section class="stats-row">
      <div class="stat-card">
        <span class="stat-label">Total tasks</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
      <div class="stat-card stat-good">
        <span class="stat-label">Completed</span>
        <span class="stat-value" id="stat-done">0</span>
      </div>
      <div class="stat-card stat-warn">
        <span class="stat-label">Pending</span>
        <span class="stat-value" id="stat-pending">0</span>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <span class="eyebrow">Assign work</span>
          <h2>Add a task</h2>
        </div>
      </div>

      <form id="task-form" class="task-form">
        <input type="hidden" id="task-id" value="">

        <label class="field">
          <span>Employee ID</span>
          <input type="text" id="emp_id" placeholder="EMP-104" required>
        </label>

        <label class="field">
          <span>Employee name</span>
          <input type="text" id="emp_name" placeholder="Jane Doe" required>
        </label>

        <label class="field">
          <span>Task</span>
          <select id="task_name" required>
            <option value="" disabled selected>Select a task</option>
            {% for opt in task_options %}
              <option value="{{ opt }}">{{ opt }}</option>
            {% endfor %}
          </select>
        </label>

        <label class="field">
          <span>Completed</span>
          <select id="completed" required>
            <option value="" disabled selected>Select</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </label>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="form-submit-btn">Add task</button>
          <button type="button" class="btn btn-ghost" id="form-cancel-btn" hidden>Cancel edit</button>
        </div>
      </form>
      <p class="form-msg" id="form-msg"></p>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <span class="eyebrow">Assignment log</span>
          <h2>All tasks</h2>
        </div>
        <label class="field search-field">
          <span>Search</span>
          <input type="text" id="search-input" placeholder="Filter by employee, ID or task">
        </label>
      </div>

      <div class="table-wrap">
        <table class="task-table">
          <thead>
            <tr>
              <th>Emp ID</th>
              <th>Employee name</th>
              <th>Task</th>
              <th>Completed</th>
              <th class="col-actions">Actions</th>
            </tr>
          </thead>
          <tbody id="task-table-body">
            <!-- rows injected by script.js -->
          </tbody>
        </table>
        <p class="empty-state" id="empty-state" hidden>No tasks yet. Add the first one above.</p>
      </div>
    </section>
  </main>

  <script>
    window.TASK_OPTIONS = {{ task_options | tojson }};
  </script>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
